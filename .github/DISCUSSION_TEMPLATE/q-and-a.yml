title: "Q&A: "
labels:
  - question
category: General
body:
  - type: markdown
    attributes:
      value: |
        Thanks for your question! Please include enough detail so others can help.
  - type: textarea
    id: question
    attributes:
      label: Question
      description: What do you need help with?
      placeholder: Describe your question clearly.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Share relevant details, links, or screenshots.
